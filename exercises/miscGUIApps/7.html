<!doctype html>
<html lang="en">
  <head>
    <title>Cars for Sale</title>
    <link rel="stylesheet" href="./7.css" />
  </head>
  <body>
    <header>
      <h1>Buy Used Cars</h1>
      <div id="filters">
        <label for="make_select">Make</label>
        <select name="make" id="make_select"></select>

        <label for="model_select">Model</label>
        <select name="model" id="model_select"></select>

        <label for="price_select">Price</label>
        <select name="price" id="price_select"></select>

        <label for="year_select">Year</label>
        <select name="year" id="year_select"></select>

        <button class="filter_btn">Filter</button>
      </div>
    </header>
    <main>
      <div id="cars"></div>
    </main>
    <script src="./7.js"></script>
  </body>
</html>
