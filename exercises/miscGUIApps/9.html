<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rich Text Editor</title>
    <link rel="stylesheet" href="./9.css">
  </head>
  <body>
    <h1>Rich Text Editor</h1>
    <div class="editor">
      <div class="buttons">
        <button id="bold" class="fa fa-bold" title="Bold"></button>
        <button id="italic" class="fa fa-italic" title="Italic"></button>
        <button id="underline" class="fa fa-underline" title="Underline"></button>
        <button id="strikeThrough" class="fa fa-strikethrough" title="Strike Through"></button>
        <button id="createLink" class="fa fa-link" title="Create Link"></button>
        <button id="insertUnorderedList" class="fa fa-list-ul list" title="Create Bullet List"></button>
        <button id="insertOrderedList" class="fa fa-list-ol list" title="Create Numbered List"></button>
        <button id="justifyLeft" class="fa fa-align-left align" title="Align Left"></button>
        <button id="justifyRight" class="fa fa-align-right align" title="Align Right"></button>
        <button id="justifyCenter" class="fa fa-align-center align" title="Center"></button>
        <button id="justifyFull" class="fa fa-align-justify align" title="Justify"></button>
      </div>
      <div class="text_box" contenteditable="true"></div>
    </div>
    <script src="./9.js"></script>
  </body>
</html>
