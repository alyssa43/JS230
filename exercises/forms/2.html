<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="./whitespace-reset.css" />
    <link rel="stylesheet" href="./2.css" />
  </head>
  <body>
    <h1>Sign up Form</h1>
    <form action="#" method="post" autocomplete="off" novalidate>
      <p class="form_errors"></p>
      <fieldset>
        <dl>
          <dt>
            <label for="first_name">First Name</label>
          </dt>
          <dd>
            <input type="text" id="first_name" name="first_name" required />
            <span class="error_message"></span>
          </dd>

          <dt>
            <label for="last_name">Last Name</label>
          </dt>
          <dd>
            <input type="text" id="last_name" name="last_name" required />
            <span class="error_message"></span>
          </dd>

          <dt>
            <label for="email">Email</label>
          </dt>
          <dd>
            <input
              type="email"
              id="email"
              name="email"
              pattern=".+@.+"
              required
            />
            <span class="error_message"></span>
          </dd>

          <dt>
            <label for="password">Password</label>
          </dt>
          <dd>
            <input
              type="password"
              id="password"
              name="password"
              minlength="10"
              required
            />
            <span class="error_message"></span>
          </dd>

          <dt>
            <label for="credit_card1">Credit Card</label>
          </dt>
          <dd>
            <input
              type="text"
              name="credit_card"
              id="credit_card1"
              maxlength="4"
              required
            />
            <input
              type="text"
              name="credit_card"
              id="credit_card2"
              maxlength="4"
              required
            />
            <input
              type="text"
              name="credit_card"
              id="credit_card3"
              maxlength="4"
              required
            />
            <input
              type="text"
              name="credit_card"
              id="credit_card4"
              maxlength="4"
              required
            />
            <span class="error_message"></span
            >
          </dd>

          <dt>
            <label for="phone">Phone Number</label>
          </dt>
          <dd>
            <input
              type="tel"
              id="phone"
              name="phone"
              pattern="\d{3}-\d{3}-\d{4}"
              placeholder="111-222-3333"
            />
            <span class="error_message"></span>
          </dd>
        </dl>

        <button type="submit">Sign Up</button>
      </fieldset>
    </form>
    <script src="./2.js"></script>
  </body>
</html>
